server {
    listen 8083;
    listen [::]:8083;

    server_name pgsosdn.inno.ph localhost;
    client_max_body_size 100M;
    root /var/www/pgo-mis/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;

    charset utf-8;

    # Trust Cloudflare Tunnel - set scheme to https
    set $forwarded_scheme $scheme;
    if ($http_x_forwarded_proto = "https") {
        set $forwarded_scheme "https";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        # Cloudflare Tunnel proxy headers - tell PHP this is HTTPS
        fastcgi_param HTTPS on;
        fastcgi_param REQUEST_SCHEME https;
        fastcgi_param SERVER_PORT 443;

        # Forward original client info from Cloudflare
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/pgo-mis-access.log;
    error_log /var/log/nginx/pgo-mis-error.log;
}
